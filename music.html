<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Zidniryi — Music | Cinematic Indie Artist</title>
  <meta name="description" content="Listen to Zidniryi — an independent cinematic indie musician. Explore albums, tracks, and embedded YouTube music from Zidniryi." />
  <meta name="keywords" content="Zidniryi, indie music, cinematic music, independent artist, Frostbite album, YouTube music" />
  <meta name="author" content="Zidniryi" />
  <link rel="canonical" href="https://zidniryi.github.io/music.html" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zidniryi.github.io/music.html" />
  <meta property="og:title" content="Zidniryi — Music | Cinematic Indie Artist" />
  <meta property="og:description" content="Explore the music of Zidniryi — cinematic soundscapes and emotional compositions." />
  <meta property="og:image" content="https://zidniryi.github.io/assets/img/profile.jpeg" />
  <meta property="og:site_name" content="Zidniryi" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Zidniryi — Music | Cinematic Indie Artist" />
  <meta name="twitter:description" content="Explore the music of Zidniryi — cinematic soundscapes and emotional compositions." />
  <meta name="twitter:image" content="https://zidniryi.github.io/assets/img/profile.jpeg" />

  <!-- Structured Data (MusicGroup) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "Zidniryi",
    "url": "https://zidniryi.github.io/music.html",
    "description": "Independent cinematic indie musician crafting emotional soundscapes.",
    "image": "https://zidniryi.github.io/assets/img/profile.jpeg",
    "genre": ["Indie", "Cinematic"]
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Playfair Display', 'serif'] } } }
    }
  </script>

  <style>
    :root {
      --bg:      #07070f;
      --surf:    rgba(255,255,255,.045);
      --border:  rgba(255,255,255,.075);
      --accent:  #8b5cf6;
      --pink:    #ec4899;
      --text:    #f0f0ff;
      --muted:   #8888aa;
    }

    html { scroll-behavior: smooth; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,.35); border-radius: 3px; }

    /* ─── Gradient text ─── */
    .gt {
      background: linear-gradient(135deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Navbar ─── */
    #topnav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      transition: background .3s, box-shadow .3s;
    }
    #topnav.solid {
      background: rgba(7,7,15,.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 1px 0 rgba(255,255,255,.055);
    }

    /* ─── Hero ─── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(-45deg, #07070f, #0f0520, #0d0d1f, #1a0818);
      background-size: 400% 400%;
      animation: gradShift 20s ease infinite;
    }

    /* dot grid overlay */
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    @keyframes gradShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* floating orbs */
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; }
    .o1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(139,92,246,.18), transparent 70%);
      top: -200px; left: -150px;
      animation: o1 22s ease-in-out infinite;
    }
    .o2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(236,72,153,.14), transparent 70%);
      bottom: -120px; right: -100px;
      animation: o2 28s ease-in-out infinite;
    }
    .o3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(59,130,246,.09), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation: o3 34s ease-in-out infinite;
    }
    @keyframes o1 {
      0%,100% { transform: translate(0,0); }
      40%     { transform: translate(80px,-100px); }
      70%     { transform: translate(-50px,70px); }
    }
    @keyframes o2 {
      0%,100% { transform: translate(0,0); }
      35%     { transform: translate(-90px,60px); }
      70%     { transform: translate(60px,-80px); }
    }
    @keyframes o3 {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%     { transform: translate(-50%,-50%) scale(1.5); }
    }

    /* hero typography */
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 12vw, 10.5rem);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -.025em;
      background: linear-gradient(135deg, #ddd6ff 0%, #a78bfa 30%, #ec4899 65%, #fbb6ce 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Fade-up animation class ─── */
    .fu {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .65s ease, transform .65s ease;
    }
    .fu.in { opacity: 1; transform: translateY(0); }

    /* ─── CTA Button ─── */
    .cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 30px;
      border-radius: 50px;
      font-size: .875rem; font-weight: 600;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff; text-decoration: none;
      transition: opacity .2s, transform .2s, box-shadow .2s;
    }
    .cta:hover {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(139,92,246,.45);
    }

    /* ─── Album section ─── */
    .album-sec { transition: opacity .25s; }

    .badge {
      display: inline-flex; align-items: center;
      background: rgba(139,92,246,.11);
      border: 1px solid rgba(139,92,246,.22);
      border-radius: 100px;
      padding: 3px 13px;
      font-size: .7rem; font-weight: 600;
      color: #c4b5fd; letter-spacing: .08em; text-transform: uppercase;
    }

    .album-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.65rem, 3vw, 2.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Song Card ─── */
    .song-card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity .5s ease,
        transform .5s cubic-bezier(.34,1.56,.64,1),
        border-color .3s,
        box-shadow .3s;
    }
    .song-card.in { opacity: 1; transform: translateY(0); }
    .song-card:hover {
      border-color: rgba(139,92,246,.45);
      box-shadow: 0 0 28px rgba(139,92,246,.22), 0 8px 32px rgba(0,0,0,.45);
      transform: translateY(-4px) scale(1.012) !important;
    }

    /* iframe area */
    .iframe-box {
      position: relative; width: 100%;
      aspect-ratio: 16 / 9;
      background: #0a0a16; overflow: hidden;
    }
    .iframe-box iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; opacity: 0;
      transition: opacity .5s;
    }
    .iframe-box iframe.loaded { opacity: 1; }

    /* placeholder */
    .ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: linear-gradient(135deg, #0a0a16, #160a2a);
      transition: opacity .4s;
    }
    .ph.gone { opacity: 0; pointer-events: none; }

    /* loading ring animation */
    .loading-ring {
      width: 54px; height: 54px; border-radius: 50%;
      border: 2px solid rgba(139,92,246,.2);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
      display: none;
    }
    .ph.loading .play-ring { display: none; }
    .ph.loading .loading-ring { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Divider ─── */
    .hdiv {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,.06), transparent);
    }

    /* ─── Mobile menu ─── */
    #mmenu {
      display: none;
      background: rgba(7,7,15,.96);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.05);
    }
    #mmenu.open { display: block; }

    /* ─── Social icons ─── */
    .social-link {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
      font-size: 1.05rem;
      text-decoration: none;
      transition: color .2s, background .2s, border-color .2s, transform .2s, box-shadow .2s;
    }
    .social-link:hover {
      color: #fff;
      background: rgba(139,92,246,.2);
      border-color: rgba(139,92,246,.45);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139,92,246,.3);
    }
    .social-link.yt:hover  { background: rgba(255,0,0,.2);   border-color: rgba(255,0,0,.4);   box-shadow: 0 6px 20px rgba(255,0,0,.25); }
    .social-link.tw:hover  { background: rgba(29,161,242,.2); border-color: rgba(29,161,242,.4); box-shadow: 0 6px 20px rgba(29,161,242,.25); }
    .social-link.ig:hover  { background: rgba(225,48,108,.2); border-color: rgba(225,48,108,.4); box-shadow: 0 6px 20px rgba(225,48,108,.25); }
    .social-link.sc:hover  { background: rgba(255,85,0,.2);   border-color: rgba(255,85,0,.4);   box-shadow: 0 6px 20px rgba(255,85,0,.25); }

    /* ─── Footer ─── */
    footer { border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav id="topnav">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">

    <a href="#hero" class="gt font-bold text-lg tracking-widest uppercase select-none">
      Zidniryi
    </a>

    <div class="hidden md:flex items-center gap-8">
      <a href="#music" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Music</a>
      <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Portfolio</a>
    </div>

    <button id="mob-btn" class="md:hidden p-2 text-gray-400 hover:text-white transition-colors" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div id="mmenu">
    <div class="px-6 py-5 flex flex-col gap-5">
      <a href="#music" class="text-sm font-medium text-gray-300 hover:text-white" onclick="closeMM()">Music</a>
      <a href="index.html" class="text-sm font-medium text-gray-300 hover:text-white">Portfolio</a>
    </div>
  </div>
</nav>

<!-- ══════════ HERO ══════════ -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>

  <div class="relative z-10 px-4 py-20 flex flex-col items-center max-w-4xl mx-auto">
    <p class="fu text-xs font-semibold tracking-[.28em] uppercase text-purple-400 mb-6">
      Independent Artist
    </p>
    <h1 id="hero-name" class="hero-title fu mb-6"></h1>
    <p id="hero-tag" class="fu text-base md:text-xl font-light text-gray-400 max-w-md text-center mb-8 leading-relaxed"></p>
    <div class="fu flex items-center gap-3 mb-10">
      <a href="https://www.youtube.com/@zidniryi" target="_blank" rel="noopener" class="social-link yt" aria-label="YouTube">
        <i class="fa-brands fa-youtube"></i>
      </a>
      <a href="https://twitter.com/zidniryi" target="_blank" rel="noopener" class="social-link tw" aria-label="Twitter / X">
        <i class="fa-brands fa-x-twitter"></i>
      </a>
      <a href="https://instagram.com/zidniryi" target="_blank" rel="noopener" class="social-link ig" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a href="https://soundcloud.com/zidni-ridwan-n" target="_blank" rel="noopener" class="social-link sc" aria-label="SoundCloud">
        <i class="fa-brands fa-soundcloud"></i>
      </a>
    </div>
    <div class="fu">
      <a href="#music" class="cta">
        Explore Music
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </a>
    </div>
  </div>
</section>

<!-- ══════════ ALBUMS ══════════ -->
<main id="music" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-16 pb-28" style="scroll-margin-top:4rem">
  <div id="albums-root"></div>
</main>

<!-- ══════════ FOOTER ══════════ -->
<footer class="py-10 text-center px-4">
  <p class="text-gray-600 text-sm tracking-wide">
    © <span id="yr"></span>
    <span class="gt font-semibold">Zidniryi</span>
    · All rights reserved
  </p>
</footer>

<script>
// ── Utility ────────────────────────────────────────────────────────────────
const el = id => document.getElementById(id);

function embedUrl(raw) {
  try {
    const vid = new URL(raw).searchParams.get('v');
    return vid ? `https://www.youtube.com/embed/${vid}?rel=0&modestbranding=1` : null;
  } catch { return null; }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render({ artist, albums }) {
  el('hero-name').textContent = artist.name;
  el('hero-tag').textContent  = artist.tagline;
  el('yr').textContent        = new Date().getFullYear();

  const root = el('albums-root');
  root.innerHTML = '';

  albums.forEach((album, ai) => {
    const sec = document.createElement('section');
    sec.className = 'album-sec mb-20';
    sec.dataset.album = album.title.toLowerCase();

    if (ai > 0) {
      const d = document.createElement('div');
      d.className = 'hdiv mb-16';
      sec.appendChild(d);
    }

    // Album header
    const hdr = document.createElement('div');
    hdr.className = 'fu mb-10';

    hdr.innerHTML = `
      <span class="badge">Album</span>
      <h2 class="album-title mt-3">${album.title}</h2>
    `;
    sec.appendChild(hdr);

    // Songs grid
    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5';

    album.songs.forEach((song, si) => {
      const src  = embedUrl(song.youtubeUrl);
      const card = document.createElement('article');
      card.className = 'song-card';
      card.dataset.song = song.title.toLowerCase();
      card.style.transitionDelay = `${si * 70}ms`;

      card.innerHTML = src ? `
        <div class="iframe-box">
          <iframe data-src="${src}" title="${song.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
          <div class="ph">
            <div class="loading-ring"></div>
          </div>
        </div>
      ` : `
        <div class="iframe-box">
          <div class="ph" style="cursor:default">
            <p style="color:var(--muted);font-size:.75rem;text-align:center;padding:0 16px">Video unavailable</p>
          </div>
        </div>
      `;

      grid.appendChild(card);
    });

    sec.appendChild(grid);
    root.appendChild(sec);
  });

  initObserver();
}

// ── Intersection Observer ──────────────────────────────────────────────────
function initObserver() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const node = e.target;
      node.classList.add('in');

      // Auto-load iframe when card enters viewport
      if (node.classList.contains('song-card')) {
        const delay = parseInt(node.style.transitionDelay) || 0;
        setTimeout(() => { node.style.transitionDelay = '0ms'; }, 550 + delay);

        const iframe = node.querySelector('iframe[data-src]');
        if (iframe) {
          const ph = node.querySelector('.ph');
          ph.classList.add('loading');
          iframe.src = iframe.dataset.src;
          iframe.removeAttribute('data-src');
          iframe.addEventListener('load', () => {
            iframe.classList.add('loaded');
            ph.classList.add('gone');
          }, { once: true });
        }
      }

      io.unobserve(node);
    });
  }, { rootMargin: '80px 0px', threshold: 0.07 });

  document.querySelectorAll('.song-card, .fu').forEach(n => io.observe(n));
}

// ── Navbar ────────────────────────────────────────────────────────────────
function initNav() {
  const nav = el('topnav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('solid', window.scrollY > 10);
  }, { passive: true });

  el('mob-btn').addEventListener('click', () => {
    el('mmenu').classList.toggle('open');
  });
}

function closeMM() { el('mmenu').classList.remove('open'); }

// ── Bootstrap ─────────────────────────────────────────────────────────────
async function boot() {
  initNav();

  // Stagger hero elements in
  setTimeout(() => {
    document.querySelectorAll('#hero .fu').forEach((n, i) => {
      setTimeout(() => n.classList.add('in'), i * 170);
    });
  }, 180);

  try {
    const res = await fetch('music-data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    render(await res.json());
  } catch (err) {
    el('albums-root').innerHTML = `
      <div class="text-center py-28">
        <p class="text-gray-500 text-lg">Could not load music library</p>
        <p class="text-gray-600 text-sm mt-2">${err.message}</p>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
