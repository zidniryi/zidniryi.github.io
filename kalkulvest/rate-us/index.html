<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=https://play.google.com/store/games?hl=id">
    <title>Redirecting to Play Store - KalKulVest</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
            color: #333;
        }
        .message {
            margin-bottom: 20px;
        }
        a {
            color: #58e089;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
    <script>
        window.location.href = "https://play.google.com/store/games?hl=id";
    </script>
</head>
<body>
    <div class="message">
        <p>Mengalihkan Anda ke Play Store...</p>
        <p>Jika tidak dialihkan secara otomatis, silakan klik <a href="https://play.google.com/store/games?hl=id">tautan ini</a>.</p>
    </div>
</body>
</html>
